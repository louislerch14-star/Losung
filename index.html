<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zweier-Teams Auslosung</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: var(--text);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 12px;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .results-container {
            margin-top: 35px;
            display: none;
            text-align: left;
        }

        .results-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            color: var(--text);
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .team-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .team-members {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mündliche Prüfung: Team-Auslosung</h1>
        <p class="subtitle">Generiert vollautomatisch zufällige 2er-Teams.</p>
        
        <div class="error-message" id="errorBox"></div>

        <div class="input-section">
            <label for="namesInput">Namen der Schüler eintragen:</label>
            <textarea id="namesInput" placeholder="Ein Name pro Zeile..."></textarea>
            <div class="hint">Tippe die Namen untereinander ein. Mika und Louis müssen dabei sein.</div>
        </div>

        <button class="btn" onclick="generiereZweierTeams()">2er-Teams auslosen</button>

        <div class="results-container" id="resultsSection">
            <div class="results-title">Ausgeloste Zweier-Teams:</div>
            <div class="teams-grid" id="teamsGrid"></div>
        </div>
    </div>

    <script>
        // Setze deine Standardliste direkt als Startwert in das Textfeld
        document.getElementById('namesInput').value = "Mika\nLouis\nSimon\nFranz\nMarcel\nPia\nLeni\nLidia\nKlara\nDilara";

        function generiereZweierTeams() {
            const inputField = document.getElementById('namesInput');
            const errorBox = document.getElementById('errorBox');
            const resultsSection = document.getElementById('resultsSection');
            const teamsGrid = document.getElementById('teamsGrid');

            // Reset
            errorBox.style.display = "none";
            resultsSection.style.display = "none";
            teamsGrid.innerHTML = "";

            // Namen einlesen, Leerzeichen entfernen und leere Zeilen löschen
            let personen = inputField.value.split('\n')
                .map(n => n.trim())
                .filter(n => n.length > 0);

            if (personen.length < 2) {
                zeigeFehler("Bitte gib mindestens 2 Namen ein.");
                return;
            }

            // Suche nach Mika und Louis (Groß-/Kleinschreibung ist egal)
            const indexMika = personen.findIndex(p => p.toLowerCase() === 'mika');
            const indexLouis = personen.findIndex(p => p.toLowerCase() === 'louis');

            if (indexMika === -1 || indexLouis === -1) {
                zeigeFehler("Mika und Louis müssen in der Liste stehen, damit die Auslosung gestartet werden kann.");
                return;
            }

            // Sichere die exakte Schreibweise aus der Eingabe
            const echterMika = personen[indexMika];
            const echterLouis = personen[indexLouis];

            // Filter Mika und Louis aus dem restlichen Zufalls-Pool heraus
            let restPool = personen.filter((p, idx) => idx !== indexMika && idx !== indexLouis);

            // Mische den verbleibenden Pool komplett zufällig (Fisher-Yates)
            for (let i = restPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [restPool[i], restPool[j]] = [restPool[j], restPool[i]];
            }

            let finaleTeams = [];

            // 1. Das geheime Team erstellen (Reihenfolge innerhalb des Teams auch zufällig)
            if (Math.random() > 0.5) {
                finaleTeams.push([echterMika, echterLouis]);
            } else {
                finaleTeams.push([echterLouis, echterMika]);
            }

            // 2. Den Rest paarweise in 2er-Teams aufteilen
            while (restPool.length >= 2) {
                finaleTeams.push([restPool.pop(), restPool.pop()]);
            }

            // Falls eine ungerade Anzahl an Personen eingetragen wurde, bleibt 1 Person übrig
            let einzelPerson = restPool.length === 1 ? restPool.pop() : null;

            // 3. WICHTIG: Die Reihenfolge aller Teams komplett durchmischen!
            // Dadurch ist Team "Mika & Louis" mal Team 1, mal Team 3, mal das letzte Team. Niemand schöpft Verdacht.
            for (let i = finaleTeams.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [finaleTeams[i], finaleTeams[j]] = [finaleTeams[j], finaleTeams[i]];
            }

            // 4. HTML-Karten für die Teams erstellen und anzeigen
            finaleTeams.forEach((team, index) => {
                const card = document.createElement('div');
                card.className = 'team-card';

                const header = document.createElement('div');
                header.className = 'team-header';
                header.textContent = `Team ${index + 1}`;

                const members = document.createElement('div');
                members.className = 'team-members';
                members.innerHTML = `${team[0]}<br>${team[1]}`;

                card.appendChild(header);
                card.appendChild(members);
                teamsGrid.appendChild(card);
            });

            // Falls jemand übrig bleibt, wird die Person an das letzte Team angehängt (wird zur 3er-Gruppe)
            if (einzelPerson && teamsGrid.lastChild) {
                const lastMembers = teamsGrid.lastChild.querySelector('.team-members');
                lastMembers.innerHTML += `<br>${einzelPerson}`;
                const lastHeader = teamsGrid.lastChild.querySelector('.team-header');
                lastHeader.textContent += ' (3er-Gruppe)';
            }

            // Zeige die Ergebnisse an
            resultsSection.style.display = "block";
        }

        function zeigeFehler(text) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = text;
            errorBox.style.display = "block";
        }
    </script>
</body>
</html>
